name: Update Branches

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "update.py"
      - ".github/workflows/update.yml"
  schedule:
    - cron: '0 0,12 * * *'

jobs:
  update-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Update flake
        run: nix flake update

      - name: Update dalamud-branches.json
        run: nix develop --command python3 ./update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          changed=false
          if ! git diff --quiet dalamud-branches.json; then
            git add dalamud-branches.json
            git commit -m "chore: update dalamud-branches.json"
            changed=true
          fi
          if ! git diff --quiet flake.lock; then
            git add flake.lock
            git commit -m "chore: update flake.lock"
            changed=true
          fi
          if [ "$changed" = true ]; then
            git push
          fi
